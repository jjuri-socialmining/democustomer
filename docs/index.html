<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DemoCustomer | Trigger de Pipelines</title>
    <style>
      :root {
        --bg0: #071321;
        --bg1: #0d2438;
        --panel: #f7f4ea;
        --text: #18181b;
        --muted: #6b7280;
        --accent: #14b8a6;
        --accent2: #f59e0b;
        --ok: #14532d;
        --err: #991b1b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 80% 10%, rgba(20,184,166,.25), transparent 35%),
          radial-gradient(circle at 15% 15%, rgba(245,158,11,.20), transparent 35%),
          linear-gradient(120deg, var(--bg0), var(--bg1));
      }
      .wrap {
        width: min(760px, 100%);
        background: var(--panel);
        border-radius: 20px;
        border: 2px solid rgba(20, 184, 166, .22);
        box-shadow: 0 24px 56px rgba(0,0,0,.35);
        padding: 28px;
      }
      h1 { margin: 0; font-size: clamp(1.4rem, 4vw, 2rem); }
      p { margin: 10px 0 16px; color: var(--muted); }
      .grid { display: grid; gap: 12px; }
      label { font-size: .9rem; font-weight: 700; }
      input {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #d4d4d8;
        font-size: .95rem;
      }
      button {
        margin-top: 4px;
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 1rem;
        font-weight: 800;
        color: #022c22;
        background: linear-gradient(90deg, var(--accent), #22d3ee);
        cursor: pointer;
      }
      .status {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #e4e4e7;
        background: #fff;
        font-size: .92rem;
      }
      .ok { color: var(--ok); background: #f0fdf4; border-color: #86efac; }
      .err { color: var(--err); background: #fef2f2; border-color: #fecaca; }
      .hint { font-size: .82rem; color: var(--muted); }
      code { background: #ece7d9; padding: 2px 6px; border-radius: 7px; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>DemoCustomer Control Panel</h1>
      <p>Pagina publica para que el cliente ejecute pipelines con un boton.</p>

      <div class="grid">
        <div>
          <label for="endpoint">Backend URL</label>
          <input id="endpoint" placeholder="https://promptops-trigger-portal-xxxxx.a.run.app" />
          <div class="hint">El backend debe exponer <code>/api/trigger</code>.</div>
        </div>

        <div>
          <label for="secret">Clave de acceso</label>
          <input id="secret" type="password" placeholder="TRIGGER_SHARED_SECRET" />
        </div>

        <div>
          <label for="reason">Motivo (opcional)</label>
          <input id="reason" placeholder="Demo cliente / Corte diario" />
        </div>

        <button id="run">Ejecutar Prompt Jobs</button>
      </div>

      <div id="status" class="status">Listo.</div>
    </main>

    <script>
      const endpointInput = document.getElementById("endpoint");
      const runBtn = document.getElementById("run");
      const statusBox = document.getElementById("status");

      const saved = localStorage.getItem("demo_trigger_endpoint");
      if (saved) endpointInput.value = saved;

      function setStatus(msg, cls = "") {
        statusBox.textContent = msg;
        statusBox.className = "status " + cls;
      }

      runBtn.addEventListener("click", async () => {
        const endpoint = endpointInput.value.trim().replace(/\/$/, "");
        const secret = document.getElementById("secret").value;
        const reason = document.getElementById("reason").value.trim() || "Cliente trigger";

        if (!endpoint) {
          setStatus("Falta Backend URL.", "err");
          return;
        }

        localStorage.setItem("demo_trigger_endpoint", endpoint);
        setStatus("Disparando workflow...");
        runBtn.disabled = true;

        try {
          const res = await fetch(`${endpoint}/api/trigger`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...(secret ? { "X-Trigger-Secret": secret } : {}),
            },
            body: JSON.stringify({ reason }),
          });

          const data = await res.json();
          if (!res.ok || !data.ok) {
            throw new Error(data.error || "No se pudo ejecutar");
          }

          if (data.run_url) {
            statusBox.innerHTML = `Workflow enviado. Run: <a href="${data.run_url}" target="_blank" rel="noreferrer">${data.run_url}</a>`;
            statusBox.className = "status ok";
          } else {
            setStatus("Workflow enviado. Revisa GitHub Actions.", "ok");
          }
        } catch (err) {
          setStatus(`Error: ${err.message}`, "err");
        } finally {
          runBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
